<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garnet Brook Farm</title>

<style>
html {
  font-size: 18px;
}


body {
  font-family: serif;
  background: beige;
  color: #1e1b18;
  margin: 0 auto;
  padding: 1rem;
  max-width: 60rem;
  line-height: 1.35;
  -webkit-text-size-adjust: 100%;

}

p {
  margin: 0.25rem 0 0.75rem 0;
  line-height: 1.3;
}

h1 {
  margin: 0;
  padding: 0;
}

.header-block {
  display: flex;
  align-items: center;
  gap: .7rem;
  margin-bottom: 1.5rem;
}

.logo {
  width: 30px;
  height: auto;
  opacity: 0.90;
}

.title-stack h1 {
  margin: 0;
  font-size: 1.6rem;
  line-height: 1.05;
}

.subtitle {
  font-size: 1rem;
  color: #3a332d;
  line-height: 1.1;
  font-style: italic;
}

.section-head {
  font-size: 1.2rem;
  margin-top: 2rem;
  margin-bottom: 0.5rem;
  color: #3a332d;
  font-style: italic;
}

.divider {
  border-bottom: 2px dotted Sienna;
  margin: 2rem 0;
}

.table-wrapper {
  width: 100%;
}

.product-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 1rem;
  line-height: 1.1;
  margin-bottom: 1.5rem;
}

.product-table th {
  text-align: left;
  padding-bottom: 0.3rem;
  border-bottom: 2px solid #1e1b18;
  font-weight: normal;
  color: #3a332d; 

}

.product-table td {
  padding: 0.25rem 0.5rem;
  border-bottom: 1px solid #1e1b18;
}

.desc {
  color: #4a453f;
  font-size: 0.9rem;
}

.available {
  cursor: pointer;
}

.available:hover {
  background: palegoldenrod;
}

.unavailable {
  color: dimgray;
}

.soldout-text {
  color: grey;
  font-weight: bolder;
  font-size: 0.8rem;
  letter-spacing: 0.3px;
}

.price {
  text-align: right;
  white-space: nowrap;
}

.printer-mark {
  margin-top: 3rem;
  text-align: center;
  opacity: 0.85;
}

.printer-mark img {
  width: 400px;      /* tune to taste */
  height: auto;
  display: inline-block;
  filter: grayscale(100%) contrast(180%);
}



/* Secondary catch-all for narrow viewports */
@media (max-width: 700px) {
  .product-table,
  .product-table thead,
  .product-table tbody,
  .product-table tr,
  .product-table th,
  .product-table td {
    display: block;
    width: 100%;
  }

  .product-table thead {
    display: none;
  }

  .product-table tr {
    margin-bottom: 1.5rem;
    border-bottom: 2px dotted #d8d2c4;
    padding-bottom: 1rem;
  }

  .product-table td {
    border: none;
    padding: 0.25rem 0;
  }

  .product-table td.price {
    text-align: left;
    font-weight: bold;
    margin-top: 0.25rem;
  }

  .desc {
    margin-top: 0.25rem;
  }
}
</style>
</head>

<body>

<div class="header-block">
  <img src="logo.png" alt="Garnet Brook Farm logo" class="logo">
  <div class="title-stack">
    <h1>Garnet Brook Farm</h1>
    <!-- <span class="subtitle">tiny orchard of uncommon fruit</span> -->
  </div>
</div>

<p>Garnet Brook Farm is a single acre experimental farm in Willington, CT.</p>
